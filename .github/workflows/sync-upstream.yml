name: Sync upstream

on:
  schedule:
    # Daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency: sync-upstream

jobs:
  sync:
    name: Merge upstream main into fork main
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/mattpocock/skills.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Merge upstream main
        run: |
          set -e
          # Fast-forward when possible; merge commit when fork has diverged.
          git merge upstream/main --no-edit || {
            echo "::warning::Merge conflict detected — resolve manually in the fork."
            git merge --abort
            exit 1
          }

      - name: Push to fork main
        run: git push origin main
